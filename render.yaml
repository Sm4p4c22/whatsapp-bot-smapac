services:
  - type: web
    name: whatsapp-bot-smapac
    runtime: docker
    repo: https://github.com/Sm4p4c22/whatsapp-bot-smapac
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: API_CONTRATOS_URL
